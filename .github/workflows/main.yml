name: CI - Train SVM Model

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check CSV file presence
        run: ls -la data_preprocessing/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn

      - name: Run mlflow project
        env:
           MLFLOW_TRACKING_URI: http://127.0.0.1:5000/
        run: python modelling.py

      # Optional: commit mlruns (tidak direkomendasikan)
      - name: Commit mlruns folder
        if: false  # ubah ke true kalau ingin aktifkan
        run: |
          git config --global user.name "${{ secrets.USERNAME }}"
          git config --global user.email "${{ secrets.EMAIL }}"
          git add mlruns/
          git commit -m "Save mlruns from CI run"
          git push origin main
